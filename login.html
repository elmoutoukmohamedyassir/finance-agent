<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Finance Agent</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e0e; --surface: #161616; --border: #2a2a2a; --border-light: #333;
    --text: #e8e8e8; --text-muted: #666; --text-dim: #444;
    --accent: #d4ff4e; --accent-dim: rgba(212,255,78,0.08); --accent-border: rgba(212,255,78,0.25);
    --error: #ef9a9a; --error-dim: rgba(239,154,154,0.08); --error-border: rgba(239,154,154,0.3);
    --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif; --radius: 4px;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.6; }
  .page { min-height: 100vh; display: flex; flex-direction: column; }
  header { padding: 20px 24px; display: flex; align-items: center; justify-content: center; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-mark { width: 28px; height: 28px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .logo-mark svg { width: 14px; height: 14px; }
  .logo-text { font-family: var(--mono); font-size: 13px; font-weight: 500; }
  .logo-text span { color: var(--accent); }
  .center { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .auth-card { width: 100%; max-width: 380px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px 28px; animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .auth-card h1 { font-family: var(--mono); font-size: 19px; font-weight: 500; margin-bottom: 6px; }
  .auth-card h1 span { color: var(--accent); }
  .auth-card .subtitle { color: var(--text-muted); font-size: 13px; margin-bottom: 24px; }
  .field { margin-bottom: 16px; display: flex; flex-direction: column; gap: 6px; }
  .field label { font-family: var(--mono); font-size: 10.5px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.04em; }
  .field input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 12px; border-radius: var(--radius); font-family: var(--sans); font-size: 14px; outline: none; transition: border-color 0.2s; }
  .field input:focus { border-color: var(--border-light); }
  .field input::placeholder { color: var(--text-dim); }
  .error-box { background: var(--error-dim); border: 1px solid var(--error-border); color: var(--error); font-size: 12px; padding: 10px 12px; border-radius: var(--radius); margin-bottom: 16px; display: none; line-height: 1.5; }
  .error-box.show { display: block; }
  button.submit { width: 100%; background: var(--accent); color: #0e0e0e; border: none; font-family: var(--mono); font-size: 13px; font-weight: 500; padding: 12px; border-radius: var(--radius); cursor: pointer; margin-top: 4px; transition: opacity 0.15s, transform 0.1s; }
  button.submit:hover { opacity: 0.88; }
  button.submit:active { transform: scale(0.98); }
  button.submit:disabled { opacity: 0.4; cursor: default; }
  .switch-link { margin-top: 20px; text-align: center; font-size: 12.5px; color: var(--text-muted); }
  .switch-link a { color: var(--accent); text-decoration: none; }
  .switch-link a:hover { text-decoration: underline; }
  .guest-link { margin-top: 10px; text-align: center; }
  .guest-link a { font-family: var(--mono); font-size: 11px; color: var(--text-dim); text-decoration: none; transition: color 0.15s; }
  .guest-link a:hover { color: var(--text-muted); }
  details.advanced { margin-top: 22px; border-top: 1px solid var(--border); padding-top: 14px; }
  details.advanced summary { font-family: var(--mono); font-size: 10.5px; color: var(--text-dim); cursor: pointer; list-style: none; }
  details.advanced summary::-webkit-details-marker { display: none; }
  .api-row { margin-top: 12px; display: flex; align-items: center; gap: 8px; }
  .api-row label { font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
  .api-row input { font-family: var(--mono); font-size: 11px; background: var(--bg); border: 1px solid var(--border); color: var(--text-muted); padding: 4px 8px; border-radius: 3px; width: 100%; outline: none; }
  .api-row input:focus { border-color: var(--border-light); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); flex-shrink: 0; }
  .dot.ok { background: var(--accent); }
  .dot.err { background: var(--error); }
</style>
</head>
<body>
<div class="page">

  <header>
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 14 14" fill="none"><path d="M7 1L13 4V10L7 13L1 10V4L7 1Z" stroke="#0e0e0e" stroke-width="1.5" stroke-linejoin="round"/></svg>
      </div>
      <div class="logo-text">finance<span>_agent</span>.ma</div>
    </div>
  </header>

  <div class="center">
    <div class="auth-card">
      <h1>Bon retour,<br><span>connectez-vous</span></h1>
      <p class="subtitle">Accédez à vos sessions, vos plans financiers et vos KPIs sauvegardés.</p>

      <div class="error-box" id="errorBox"></div>

      <form id="loginForm" autocomplete="on">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="entrepreneur@startup.ma" required autocomplete="username">
        </div>
        <div class="field">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="submit" id="submitBtn">se connecter →</button>
      </form>

      <div class="switch-link">Pas encore de compte ? <a href="signup.html">Créer un compte</a></div>
      <div class="guest-link"><a href="frontend.html" onclick="continueAsGuest()">continuer sans compte →</a></div>

      <details class="advanced">
        <summary>paramètres avancés</summary>
        <div class="api-row">
          <label>API URL</label>
          <input type="text" id="apiUrl" />
          <div class="dot" id="connDot"></div>
        </div>
      </details>
    </div>
  </div>

</div>
<script>
  const API_URL_KEY = 'fa_api_url';
  const AUTH_KEY = 'fa_auth';

  function apiUrl() {
    return (document.getElementById('apiUrl').value || 'http://localhost:8000').replace(/\/$/, '');
  }

  function initApiUrl() {
    const input = document.getElementById('apiUrl');
    input.value = localStorage.getItem(API_URL_KEY) || 'http://localhost:8000';
    input.addEventListener('change', () => {
      localStorage.setItem(API_URL_KEY, apiUrl());
      checkConn();
    });
  }

  async function checkConn() {
    const dot = document.getElementById('connDot');
    try {
      const r = await fetch(apiUrl() + '/api/v1/health', { signal: AbortSignal.timeout(3000) });
      dot.className = r.ok ? 'dot ok' : 'dot err';
    } catch { dot.className = 'dot err'; }
  }

  function showError(msg) {
    const box = document.getElementById('errorBox');
    box.textContent = msg;
    box.className = 'error-box show';
  }

  function hideError() {
    document.getElementById('errorBox').className = 'error-box';
  }

  function continueAsGuest() {
    sessionStorage.setItem('fa_guest', '1');
  }

  function storeAuth(data) {
    // access_token: short-lived JWT sent on every request.
    // refresh_token: long-lived opaque token, only ever sent to
    // /auth/refresh and /auth/logout — never to /chat or anything else.
    localStorage.setItem(AUTH_KEY, JSON.stringify({
      access_token: data.access_token,
      refresh_token: data.refresh_token,
      client_id: data.client_id,
      email: data.email,
      name: data.name
    }));
  }

  // Already logged in? Skip straight to the app.
  if (localStorage.getItem(AUTH_KEY)) {
    window.location.href = 'frontend.html';
  }

  document.addEventListener('DOMContentLoaded', () => {
    initApiUrl();
    checkConn();
  });

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    hideError();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'connexion...';
    try {
      const res = await fetch(apiUrl() + '/api/v1/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
        signal: AbortSignal.timeout(15000)
      });
      if (res.status === 401) {
        showError('Email ou mot de passe incorrect.');
        return;
      }
      if (!res.ok) {
        let detail = `Erreur serveur (${res.status})`;
        try { detail = (await res.json()).detail || detail; } catch {}
        showError(detail);
        return;
      }
      storeAuth(await res.json());
      sessionStorage.removeItem('fa_guest');
      window.location.href = 'frontend.html';
    } catch (err) {
      showError(`Impossible de contacter le serveur sur ${apiUrl()}. Vérifiez que l'API tourne et que l'URL est correcte.`);
    } finally {
      btn.disabled = false;
      btn.textContent = 'se connecter →';
    }
  });
</script>
</body>
</html>
